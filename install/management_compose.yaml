# Project N.O.M.A.D. management services Docker Compose configuration
#
# This compose file defines the admin server, database, and other supporting services required to run Project N.O.M.A.D.
# You can use this with `docker compose up -d` to start all the necessary services with a single command after installation.
#
# Note: we recommend leaving all of the environment variables as-is except for any "replaceme" values,
# which must be updated for the admin server to start successfully. The default values are optimized for ease of installation and use,
# but you can customize them as needed (e.g. changing ports, database connection details, log level, etc.)
#
# Cross-platform notes:
#   macOS (Apple Silicon): The install script sets NOMAD_DIR=$HOME/.project-nomad so all bind-mounts fall inside
#                          $HOME, which Docker Desktop shares by default. /opt is NOT in Docker Desktop's default
#                          file sharing list and will cause "mounts denied" errors.
#                          The main app images (admin, mysql, redis, dozzle) have native arm64 builds.
#                          The sidecar images (updater, disk-collector) are currently amd64-only and run via
#                          Rosetta 2 emulation on Apple Silicon — this is automatic and requires no extra setup.
#   Linux (Debian/Ubuntu): All features work natively. rslave on the disk-collector ensures /sys and /proc
#                          submounts are visible.
name: project-nomad
services:
  admin:
    image: ghcr.io/crosstalk-solutions/project-nomad:latest
    platform: linux/amd64   # amd64-only; Rosetta 2 handles emulation on Apple Silicon
    pull_policy: always
    container_name: nomad_admin
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Resolves host.docker.internal on Linux; Docker Desktop sets this automatically on macOS
    ports:
      - "8080:8080"
    volumes:
      - ${NOMAD_DIR:-/opt/project-nomad}/storage:/app/storage # If you change this path, update the disk-collector config too
      - /var/run/docker.sock:/var/run/docker.sock # Allows the admin service to communicate with the Host's Docker daemon
      - nomad-update-shared:/app/update-shared # Shared volume for update communication
    environment:
      - NODE_ENV=production
      # PORT is the internal container port — change the host-side mapping in "ports" above to expose a different port
      - PORT=8080
      - LOG_LEVEL=info
      # APP_KEY must be at least 16 chars — container won't start if this is not set
      - APP_KEY=replaceme
      # HOST=0.0.0.0 makes the server listen on all interfaces inside the container
      - HOST=0.0.0.0
      # URL should be set to the URL you will access the admin interface at (e.g. http://localhost:8080 or http://192.168.x.x:8080)
      - URL=replaceme
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      # Must match MYSQL_PASSWORD in the mysql service below
      - DB_PASSWORD=replaceme
      - DB_NAME=nomad
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DISABLE_COMPRESSION=false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  dozzle:
    # Optional: provides a browser-based log viewer. Remove if not needed.
    # The "Service Logs & Metrics" link in Settings launches Dozzle on port 9999.
    image: amir20/dozzle:v10.0
    platform: linux/arm64   # native arm64 build available
    container_name: nomad_dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOZZLE_ENABLE_ACTIONS=false # Disabled — unauthenticated container stop/restart on LAN
      - DOZZLE_ENABLE_SHELL=false   # Disabled — shell access + Docker socket = privilege escalation
  mysql:
    image: mysql:8.0
    platform: linux/arm64   # native arm64 build available
    container_name: nomad_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=replaceme
      - MYSQL_DATABASE=nomad
      - MYSQL_USER=nomad_user
      # Must match DB_PASSWORD in the admin service above
      - MYSQL_PASSWORD=replaceme
    volumes:
      - ${NOMAD_DIR:-/opt/project-nomad}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 10
  redis:
    image: redis:7-alpine
    platform: linux/arm64   # native arm64 build available
    container_name: nomad_redis
    restart: unless-stopped
    volumes:
      - ${NOMAD_DIR:-/opt/project-nomad}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
  updater:
    # Lightweight sidecar that allows in-UI updates of the admin container.
    # amd64-only image — runs via Rosetta 2 on Apple Silicon (automatic, no config needed).
    image: ghcr.io/crosstalk-solutions/project-nomad-sidecar-updater:latest
    platform: linux/amd64   # amd64-only; Rosetta 2 handles emulation on Apple Silicon
    pull_policy: always
    container_name: nomad_updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${NOMAD_DIR:-/opt/project-nomad}:${NOMAD_DIR:-/opt/project-nomad} # Must point to the same directory the compose file lives in
      - nomad-update-shared:/shared
  disk-collector:
    # Lightweight container that reports host disk usage to the admin UI.
    # amd64-only image — runs via Rosetta 2 on Apple Silicon (automatic, no config needed).
    # macOS: the root bind-mount (source: /) is removed by the install script on macOS because
    #        Docker Desktop does not allow mounting / from the host VM. Disk usage data from the
    #        host filesystem will not be available on macOS.
    # Linux: bind-mounts the real host filesystem with rslave propagation for full visibility.
    image: ghcr.io/crosstalk-solutions/project-nomad-disk-collector:latest
    platform: linux/amd64   # amd64-only; Rosetta 2 handles emulation on Apple Silicon
    pull_policy: always
    container_name: nomad_disk_collector
    restart: unless-stopped
    volumes:
      - ${NOMAD_DIR:-/opt/project-nomad}/storage:/storage
      - type: bind
        source: /
        target: /host
        read_only: true
        bind:
          # rslave makes Linux /sys and /proc submounts visible inside the container.
          # Docker Desktop on macOS ignores this option safely.
          propagation: rslave

volumes:
  nomad-update-shared:
    driver: local
